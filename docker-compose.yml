services:
  web:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.web
    ports:
      - "${PORT_WEB:-5173}:5173"
    environment:
      - PORT_WEB=${PORT_WEB:-5173}
    depends_on:
      gateway:
        condition: service_healthy
      tts-adapter:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  gateway:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.gateway
    ports:
      - "${PORT_GATEWAY:-4000}:4000"
    environment:
      - PORT_GATEWAY=${PORT_GATEWAY:-4000}
      - TEXT_ANALYSIS_URL=http://text-analysis:8001
      - TTS_ADAPTER_URL=http://tts-adapter:8002
      - TTS_ADAPTER_TIMEOUT_MS=${TTS_ADAPTER_TIMEOUT_MS:-15000}
    depends_on:
      text-analysis:
        condition: service_healthy
      tts-adapter:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:4000/health'').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  text-analysis:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.text-analysis
    environment:
      - PORT_TEXT_ANALYSIS=${PORT_TEXT_ANALYSIS:-8001}
    ports:
      - "${PORT_TEXT_ANALYSIS:-8001}:8001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8001/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  tts-adapter:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.tts-adapter
    environment:
      - PORT_TTS_ADAPTER=${PORT_TTS_ADAPTER:-8002}
      - PIPER_BIN=${PIPER_BIN:-/usr/local/bin/piper}
      - PIPER_MODEL_PATH=${PIPER_MODEL_PATH:-/models/piper/model.onnx}
      - FFMPEG_BIN=${FFMPEG_BIN:-/usr/bin/ffmpeg}
    volumes:
      - ${PIPER_MODEL_DIR:-./models/piper}:/models/piper:ro
    ports:
      - "${PORT_TTS_ADAPTER:-8002}:8002"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8002/health/ready'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

networks:
  default:
    name: emotion-tts-network
