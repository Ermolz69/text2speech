name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  workflow_lint:
    name: Workflow | validate GitHub Actions config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  web:
    name: Web | lint + typecheck + build + coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web
        run: pnpm --dir src/apps/web run lint

      - name: Typecheck web
        run: pnpm --dir src/apps/web run typecheck

      - name: Build web
        run: pnpm --dir src/apps/web run build

      - name: Test web with coverage
        run: pnpm --dir src/apps/web run --if-present coverage

      - name: Upload web coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: src/apps/web/coverage
          if-no-files-found: ignore

      - name: Append web coverage summary
        if: always()
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const summaryPath = 'src/apps/web/coverage/coverage-summary.json';
          if (!fs.existsSync(summaryPath)) {
            console.log('No web coverage summary found.');
            process.exit(0);
          }
          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8')).total;
          const lines = [
            '## Web coverage',
            '',
            '| Metric | Percent |',
            '| --- | ---: |',
            `| Lines | ${summary.lines.pct}% |`,
            `| Statements | ${summary.statements.pct}% |`,
            `| Functions | ${summary.functions.pct}% |`,
            `| Branches | ${summary.branches.pct}% |`,
            ''
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n'));
          NODE

  gateway:
    name: Gateway | lint + typecheck + build + coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint gateway
        run: pnpm --dir src/apps/gateway run lint

      - name: Typecheck gateway
        run: pnpm --dir src/apps/gateway run typecheck

      - name: Build gateway
        run: pnpm --dir src/apps/gateway run build

      - name: Test gateway with coverage
        run: pnpm --dir src/apps/gateway run --if-present coverage

      - name: Upload gateway coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-gateway
          path: src/apps/gateway/coverage
          if-no-files-found: ignore

      - name: Append gateway coverage summary
        if: always()
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const summaryPath = 'src/apps/gateway/coverage/coverage-summary.json';
          if (!fs.existsSync(summaryPath)) {
            console.log('No gateway coverage summary found.');
            process.exit(0);
          }
          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8')).total;
          const lines = [
            '## Gateway coverage',
            '',
            '| Metric | Percent |',
            '| --- | ---: |',
            `| Lines | ${summary.lines.pct}% |`,
            `| Statements | ${summary.statements.pct}% |`,
            `| Functions | ${summary.functions.pct}% |`,
            `| Branches | ${summary.branches.pct}% |`,
            ''
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n'));
          NODE

  text_analysis:
    name: Python | text-analysis | lint + test + coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: src/services/text-analysis
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        working-directory: src/services/text-analysis
        run: ruff check .

      - name: Pytest with coverage
        working-directory: src/services/text-analysis
        run: pytest -q --cov=app --cov-report=term-missing --cov-report=xml:coverage/coverage.xml --cov-report=json:coverage/coverage.json --cov-report=html:coverage/html

      - name: Upload text-analysis coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-text-analysis
          path: src/services/text-analysis/coverage
          if-no-files-found: ignore

      - name: Append text-analysis coverage summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          summary_path = 'src/services/text-analysis/coverage/coverage.xml'
          if not os.path.exists(summary_path):
              print('No text-analysis coverage summary found.')
              raise SystemExit(0)

          root = ET.parse(summary_path).getroot()
          line_rate = float(root.attrib.get('line-rate', 0)) * 100
          branch_rate = float(root.attrib.get('branch-rate', 0)) * 100
          lines = [
              '## Text-analysis coverage',
              '',
              '| Metric | Percent |',
              '| --- | ---: |',
              f'| Lines | {line_rate:.2f}% |',
              f'| Branches | {branch_rate:.2f}% |',
              ''
          ]
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as handle:
              handle.write('\n'.join(lines))
          PY

