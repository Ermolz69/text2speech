              '## TTS adapter coverage',
              '',
              '| Metric | Percent |',
              '| --- | ---: |',
              f'| Lines | {line_rate:.2f}% |',
              f'| Branches | {branch_rate:.2f}% |',
              ''
          ]
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as handle:
              handle.write('\n'.join(lines))
          PY

  audio_baseline:
    name: Audio baseline | full corpus regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run script helper tests
        shell: pwsh
        run: ./scripts/tests/script_helpers_check.ps1

      - name: Start stack
        run: docker compose up -d --build text-analysis tts-adapter gateway web

      - name: Smoke check
        shell: pwsh
        run: ./scripts/smoke_check.ps1 -RequireSynthesisReady

      - name: Run MVP baseline regression
        shell: pwsh
        run: ./scripts/run_mvp_baseline.ps1

      - name: Upload audio baseline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mvp-baseline-regression
          path: reports/mvp-baseline/latest
          if-no-files-found: warn

      - name: Dump compose state on failure
        if: failure()
        shell: bash
        run: |
          docker compose ps || true
          docker compose logs gateway text-analysis tts-adapter web --tail=200 || true

      - name: Append audio baseline summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os

          summary_path = 'reports/mvp-baseline/latest/summary.json'
          if not os.path.exists(summary_path):
              print('No audio baseline summary found; skipping summary because the baseline job failed earlier.')
              raise SystemExit(0)

          with open(summary_path, 'r', encoding='utf-8') as handle:
              summary = json.load(handle)

          passed_checks = sum(1 for item in summary.get('contrastChecks', []) if item.get('passed'))
          total_checks = len(summary.get('contrastChecks', []))
          lines = [
              '## Audio baseline regression',
              '',
              '| Metric | Value |',
              '| --- | --- |',
              f"| Prompt count | {summary['promptCount']} |",
              f"| Successful prompts | {summary['successfulPrompts']} |",
              f"| Gateway status | {summary['gatewayStatus']} |",
              f"| Text-analysis status | {summary['textAnalysisStatus']} |",
              f"| TTS adapter status | {summary['ttsAdapterStatus']} |",
              f"| TTS ready | {summary['ttsReady']} |",
              f"| Contrast checks | {passed_checks}/{total_checks} |",
              f"| Piper model path | {summary['piperModelPath']} |",
              f"| Piper version | {summary['piperVersion']} |",
              f"| FFmpeg version | {summary['ffmpegVersion']} |",
              ''
          ]
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as handle:
              handle.write('\n'.join(lines))
          PY
